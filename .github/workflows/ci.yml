# PR / 非 main 分支：TypeScript 检查 + Vite 构建验证
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  build-check:
    name: TypeScript & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript + Vite build
        run: npm run build

      - name: Docker build smoke test (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
