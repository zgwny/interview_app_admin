# ┌──────────────────────────────────────────────────────────────┐
# │  interview_app_admin — Build → Push → Deploy                │
# │  push main 触发；构建 Admin 镜像并 SSH 热更新服务器          │
# └──────────────────────────────────────────────────────────────┘
name: Deploy Admin

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/interview-admin

jobs:
  # ── Job 1: 构建并推送镜像 ─────────────────────────────────────
  build:
    name: Build & Push Admin Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Generate image tag (short SHA)
        id: tag
        run: echo "value=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: SSH 到服务器热更新 Admin 服务 ──────────────────────
  deploy:
    name: Deploy Admin to Server
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd /opt/interview

            # 更新 .env 中的 Admin 镜像 tag
            sed -i "s|^ADMIN_IMAGE_TAG=.*|ADMIN_IMAGE_TAG=${{ needs.build.outputs.image_tag }}|" \
              .env 2>/dev/null || \
              echo "ADMIN_IMAGE_TAG=${{ needs.build.outputs.image_tag }}" >> .env

            # 登录 GHCR
            echo "${{ secrets.GHCR_PAT }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 只拉取并重启 admin 容器，api / mongo / nginx 不受影响
            docker compose pull admin
            docker compose up -d --no-deps --force-recreate admin

            docker image prune -f
            echo "✅ Admin deployed — ${{ needs.build.outputs.image_tag }}"
